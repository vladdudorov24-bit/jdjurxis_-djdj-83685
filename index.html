<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Для моей любимой Любаши</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffe3ec 0%, #ffb3c6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Эффект падающих сердечек */
        .heart-bg {
            position: fixed;
            top: -10px;
            pointer-events: none;
            animation: fall linear infinite;
            color: #ff4d6d;
            font-size: 1.5rem;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) translateX(50px) rotate(360deg);
            }
        }

        /* Контейнер открытки */
        .card-container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            border: 4px solid #ff758f;
            padding: 25px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Слайды */
        .slide {
            display: none;
            animation: fadeIn 0.6s ease-in-out;
        }

        .slide.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Заголовки */
        h1 {
            color: #c9184a;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .final-title {
            color: #ff0a54;
            font-size: 2.5rem;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Стилизация изображений */
        .photo-wrapper {
            width: 100%;
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #ffb3c6;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Кнопки навигации */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        .btn:hover {
            background: #ff758f;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .dots {
            color: #ff758f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card-container">
        
        <div class="slide active">
            <h1>Моей любимой Любаше ❤️</h1>
            <div class="photo-wrapper">
                <img src="7594.jpg" alt="Мы вместе">
            </div>
        </div>

        <div class="slide">
            <h1>Самые уютные моменты ✨</h1>
            <div class="photo-wrapper">
                <img src="7576.jpg" alt="Любимый взгляд">
            </div>
        </div>

        <div class="slide">
            <h1>С тобой так тепло 🥰</h1>
            <div class="photo-wrapper">
                <img src="7246.jpg" alt="Поцелуй">
            </div>
        </div>

        <div class="slide">
            <h1 class="final-title">ЛЮБЛЮ ТЕБЯ СИЛЬНО ЛЮБИМАЯ!!! 💖</h1>
            <div class="photo-wrapper">
                <img src="6926.jpg" alt="Держимся за руки">
            </div>
        </div>

        <div class="nav-buttons">
            <button class="btn" id="prevBtn" onclick="changeSlide(-1)" disabled>Назад</button>
            <span class="dots" id="counter">1 / 4</span>
            <button class="btn" id="nextBtn" onclick="changeSlide(1)">Дальше →</button>
        </div>

    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counter = document.getElementById('counter');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide += direction;
            slides[currentSlide].classList.add('active');

            // Обновление счетчика
            counter.innerText = `${currentSlide + 1} / ${slides.length}`;

            // Управление доступностью кнопок
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slides.length - 1;
            
            if(currentSlide === slides.length - 1) {
                nextBtn.innerText = "Навсегда 💝";
            } else {
                nextBtn.innerText = "Дальше →";
            }
        }

        // Функция создания падающих сердечек
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random() * 0.7 + 0.3;
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Запуск генерации сердечек
        setInterval(createHeart, 300);
    </script>
</body>
</html>
